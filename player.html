<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroMovie Player</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    background:#0b0b0b;
    font-family:Arial;
    color:white;
}

/* 🔥 COLOR NARANJA GLOBAL */
:root{
    --plyr-color-main:#ff7b00;
}

/* Loader */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}
.spinner{
    width:60px;
    height:60px;
    border:5px solid #222;
    border-top:5px solid #ff7b00;
    border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{
    100%{transform:rotate(360deg);}
}

/* Fondo blur */
.bg{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    filter:blur(30px) brightness(0.3);
}

/* Player */
.container{
    position:relative;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

video{
    width:100%;
    max-height:100%;
}

/* Botones */
.topbar{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}
.btn{
    background:rgba(0,0,0,0.6);
    padding:10px;
    border-radius:10px;
    margin-right:5px;
    cursor:pointer;
}

/* CONTINUAR */
.continue-box{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    padding:15px 25px;
    border-radius:15px;
    z-index:20;
    display:none;
    text-align:center;
}

.continue-btn{
    margin-top:10px;
    padding:10px 20px;
    background:#ff7b00;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

/* INTRO */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:2000;
}

.logo{
    font-size:40px;
    font-weight:bold;
    color:#ff7b00;
    letter-spacing:5px;
    animation:zoom 2s ease forwards;
}

@keyframes zoom{
    0%{transform:scale(0.5); opacity:0;}
    50%{transform:scale(1.2);}
    100%{transform:scale(1); opacity:1;}
}
</style>
</head>

<body>

<div id="intro">
  <div class="logo">ASTROMOVIE</div>
</div>

<div id="loader"><div class="spinner"></div></div>

<div class="container">
    <div class="bg" id="bg"></div>

    <div class="topbar">
        <span class="btn" onclick="history.back()">⬅</span>
        <span class="btn" onclick="toggleFullscreen()">⛶</span>
    </div>

    <video id="player" controls playsinline></video>
    
    <!-- 🔥 CONTROLES PRO -->
<div id="overlayControls" style="
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
pointer-events:none;
">

  <!-- BOTÓN CENTRAL -->
  <div id="bigPlay" style="
    width:80px;
    height:80px;
    border-radius:50%;
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    pointer-events:auto;
  ">
    ▶
  </div>

  <!-- ATRÁS 10 -->
  <div onclick="back10()" style="
    position:absolute;
    left:20%;
    width:50px;
    height:50px;
    border-radius:50%;
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:auto;
  ">
    ⏪
  </div>

  <!-- ADELANTE 10 -->
  <div onclick="forward10()" style="
    position:absolute;
    right:20%;
    width:50px;
    height:50px;
    border-radius:50%;
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    pointer-events:auto;
  ">
    ⏩
  </div>

</div>

    <div class="continue-box" id="continueBox">
        <div>¿Quieres continuar donde te quedaste?</div>
        <button class="continue-btn" onclick="continuar()">Continuar viendo</button>
    </div>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const videoSrc = params.get("video");
const nextVideo = params.get("next"); // 🔥 siguiente capitulo
const subtitle = params.get("sub");

const video = document.getElementById("player");
const continueBox = document.getElementById("continueBox");

let savedTime = 0;

const player = new Plyr(video);

// HLS
if(videoSrc && videoSrc.endsWith(".m3u8")){
    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(videoSrc);
        hls.attachMedia(video);
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
        video.src = videoSrc;
    }
}else{
    video.src = videoSrc;
}

// 🔥 AUTO PLAY REAL
video.muted = true;
video.setAttribute("autoplay", true);

video.addEventListener("loadedmetadata", () => {
    savedTime = localStorage.getItem(videoSrc);

    if(savedTime && savedTime > 5){

        continueBox.style.display = "block";

        // 🔥 AQUÍ VA TU CÓDIGO
        continueBox.innerHTML = `
        <div style="font-size:14px;">
          Continuar desde <b>${Math.floor(savedTime)}s</b>
        </div>

        <div style="margin-top:10px;">
          <button class="continue-btn" onclick="continuar()">
            Continuar
          </button>

          <button class="continue-btn" 
            style="background:#333;margin-left:5px;" 
            onclick="video.currentTime=0">
            Desde inicio
          </button>
        </div>
        `;
    }
});

// Subtítulos
if(subtitle){
    const track = document.createElement("track");
    track.kind = "subtitles";
    track.label = "Español";
    track.srclang = "es";
    track.src = subtitle;
    track.default = true;
    video.appendChild(track);
}

// CONTINUAR
video.addEventListener("loadedmetadata", () => {
    savedTime = localStorage.getItem(videoSrc);
    if(savedTime && savedTime > 5){
        continueBox.style.display = "block";
    }
});

function continuar(){
    video.currentTime = savedTime;
    continueBox.style.display = "none";
    video.play();
}

// GUARDAR
video.addEventListener("timeupdate", () => {
    localStorage.setItem(videoSrc, video.currentTime);
});

// 🔥 AUTO SIGUIENTE
video.addEventListener("ended", ()=>{
    if(nextVideo){
        window.location.href =
        "player.html?video=" + encodeURIComponent(nextVideo);
    }
});

// Fondo
document.getElementById("bg").style.backgroundImage =
"url('https://picsum.photos/800/600')";

// Fullscreen
function toggleFullscreen(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }
}

// Loader
video.addEventListener("loadeddata", ()=>{
    document.getElementById("loader").style.display="none";
});
</script>

<script>
// INTRO
window.addEventListener("load", ()=>{
    const intro = document.getElementById("intro");

    setTimeout(()=>{
        intro.style.opacity = "0";
        setTimeout(()=>{
            intro.style.display = "none";

            const video = document.getElementById("player");
            if(video){
                video.play();
            }

        }, 500);
    }, 2000);
});

// 🔥 PLAY CENTRAL
const bigPlay = document.getElementById("bigPlay");

bigPlay.onclick = ()=>{
  if(video.paused){
    video.play();
  }else{
    video.pause();
  }
};

// 🔥 ADELANTAR / RETROCEDER
function back10(){
  video.currentTime -= 10;
}

function forward10(){
  video.currentTime += 10;
}

video.addEventListener("play", ()=>{
  bigPlay.style.display = "none";
});

video.addEventListener("pause", ()=>{
  bigPlay.style.display = "flex";
});
</script>

</body>
</html>
